# Prometheus Configuration
# Smart Store Operations — Observability

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "smartstore-production"

rule_files:
  - "alerts.yml"

scrape_configs:
  # Cloud API
  - job_name: "cloud-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["cloud-api:8000"]
        labels:
          service: "cloud-api"

  # Edge nodes (per store)
  - job_name: "edge-nodes"
    static_configs:
      - targets:
          - "10.1.10.10:9100"
          - "10.1.10.11:9100"
          - "10.1.10.12:9100"
        labels:
          store: "STORE-001"
      - targets:
          - "10.2.10.10:9100"
          - "10.2.10.11:9100"
          - "10.2.10.12:9100"
        labels:
          store: "STORE-002"

  # CV inference servers
  - job_name: "inference-servers"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "10.1.10.10:8001"
          - "10.1.10.11:8001"
          - "10.1.10.12:8001"
        labels:
          store: "STORE-001"
          service: "shelf-ai"

  # TimescaleDB
  - job_name: "timescaledb"
    static_configs:
      - targets: ["timescaledb:9187"]
        labels:
          service: "timescaledb"

  # Redis
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"

  # Kafka
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]
        labels:
          service: "kafka"

  # Mosquitto MQTT
  - job_name: "mosquitto"
    static_configs:
      - targets: ["mosquitto-exporter:9234"]
        labels:
          service: "mqtt"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
