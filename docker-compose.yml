# Smart Store Operations — Docker Compose
# Local development stack

version: "3.8"

services:
  # ─── Message Broker ──────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  # ─── Kafka ──────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry

  # ─── TimescaleDB ────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: smartstore
      POSTGRES_USER: smartstore
      POSTGRES_PASSWORD: smartstore_dev
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./cloud/timeseries/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ─── MLflow ─────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.0
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://smartstore:smartstore_dev@timescaledb:5432/smartstore
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlruns
    volumes:
      - mlflow_data:/mlruns
    depends_on:
      - timescaledb
    command: mlflow server --host 0.0.0.0 --port 5000

  # ─── Cloud API ──────────────────────────────────────────────
  cloud-api:
    build:
      context: .
      dockerfile: cloud/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://smartstore:smartstore_dev@timescaledb:5432/smartstore
      REDIS_URL: redis://redis:6379
      MQTT_BROKER: mosquitto
      KAFKA_BOOTSTRAP: kafka:9092
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      - timescaledb
      - redis
      - kafka
      - mosquitto
    volumes:
      - ./cloud/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Data Pipeline ──────────────────────────────────────────
  db-persistence:
    build:
      context: .
      dockerfile: cloud/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://smartstore:smartstore_dev@timescaledb:5432/smartstore
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - timescaledb
      - kafka
    command: python cloud/timeseries/db_consumer.py

  sensor-fusion:
    build:
      context: .
      dockerfile: cloud/api/Dockerfile
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      - kafka
    command: python services/fusion/kafka_topology.py

  # ─── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  # ─── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./cloud/observability/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - timescaledb
    restart: unless-stopped

volumes:
  timescaledb_data:
  mosquitto_data:
  mosquitto_log:
  mlflow_data:
  grafana_data:
